[phases.setup]
aptPkgs = [
  "xvfb",
  "libnss3",
  "libnspr4",
  "libatk1.0-0",
  "libatk-bridge2.0-0",
  "libatspi2.0-0",
  "libx11-6",
  "libx11-xcb1",
  "libxcb1",
  "libxcomposite1",
  "libxdamage1",
  "libxext6",
  "libxfixes3",
  "libxrandr2",
  "libxkbcommon0",
  "libxshmfence1",
  "libgtk-3-0",
  "libgbm1",
  "libasound2",
  "libdrm2",
  "libglib2.0-0",
  "libdbus-1-3",
  "libexpat1",
  "libfontconfig1",
  "fonts-liberation"
]

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "python -m playwright install chromium"
]

[start]
cmd = "xvfb-run -a python discord_bot.py"